[build]
  command = "npm install && node build.js"
  publish = "."

[functions]
  directory = "netlify/functions"

# Redirect old admin.html to renamed library-admin page
[[redirects]]
  from = "/admin.html"
  to = "/library-admin.html"
  status = 301

# AMASAMYA subdomain rewrite — serve /ama11y/ content at amasamya.akhileshmalani.com
[[redirects]]
  from = "https://amasamya.akhileshmalani.com/*"
  to = "/ama11y/:splat"
  status = 200
  force = true

# Redirect old orphaned bookmarklet installer to new location
[[redirects]]
  from = "/AMASAMYA_Bookmarklet_Installer.html"
  to = "/ama11y/install.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets (images, fonts, icons)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS and JS (1 week — content may change on deploy)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages — no cache (always fresh on deploy)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
