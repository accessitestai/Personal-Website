[build]
  command = "npm install && node build.js"
  publish = "."

[functions]
  directory = "netlify/functions"

# Redirect old admin.html to renamed library-admin page
[[redirects]]
  from = "/admin.html"
  to = "/library-admin.html"
  status = 301

# AMASAMYA subdomain rewrite — serve /amasamya/ content at amasamya.akhileshmalani.com
[[redirects]]
  from = "https://amasamya.akhileshmalani.com/*"
  to = "/amasamya/:splat"
  status = 200
  force = true

# Redirect old /ama11y/ paths on apex domain to new /amasamya/ paths (backward compat).
# Netlify path matching is case-sensitive, so add the common uppercase variants
# explicitly — Chrome Web Store listings created during the AMA11Y branding era
# may reference /AMA11Y/ with capitals and would otherwise 404.
[[redirects]]
  from = "/ama11y/*"
  to = "/amasamya/:splat"
  status = 301
[[redirects]]
  from = "/AMA11Y/*"
  to = "/amasamya/:splat"
  status = 301
[[redirects]]
  from = "/Ama11y/*"
  to = "/amasamya/:splat"
  status = 301

# Privacy-policy aliases — Chrome Web Store / Firefox / Edge reviewers (and
# anyone else) get a direct 200 from any sensible URL. Avoids the "policy
# link broken/unavailable" enforcement (Purple Nickel) when a stale listing
# URL targets one of these paths.
[[redirects]]
  from = "/privacy"
  to = "/amasamya/privacy.html"
  status = 200
[[redirects]]
  from = "/privacy.html"
  to = "/amasamya/privacy.html"
  status = 200
[[redirects]]
  from = "/ama11y/privacy"
  to = "/amasamya/privacy.html"
  status = 200
[[redirects]]
  from = "/amasamya/privacy"
  to = "/amasamya/privacy.html"
  status = 200

# Redirect old orphaned bookmarklet installer to new location
[[redirects]]
  from = "/AMASAMYA_Bookmarklet_Installer.html"
  to = "/amasamya/install.html"
  status = 301

[[redirects]]
  from = "/AMA11Y_Bookmarklet_Installer.html"
  to = "/amasamya/install.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets (images, fonts, icons)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS and JS (1 week — content may change on deploy)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages — revalidate on every request, but allow the browser to
# serve from cache when the ETag matches (Netlify sets a strong ETag
# automatically). `no-cache` does NOT mean "do not cache" — it means
# "revalidate before reuse". This gives a fast 304-Not-Modified path
# on unchanged deploys instead of always re-downloading the full page,
# while still guaranteeing freshness when the deploy changes.
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, no-cache"
