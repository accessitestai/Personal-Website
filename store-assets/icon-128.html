<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>*{margin:0;padding:0;}body{width:128px;height:128px;overflow:hidden;}</style>
</head>
<body>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0369a1"/>
      <stop offset="50%"  stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="128" height="128" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#rounded)" opacity="0.07" stroke="#7ec8e3" stroke-width="0.5">
    <line x1="0"  y1="16" x2="128" y2="16"/>
    <line x1="0"  y1="32" x2="128" y2="32"/>
    <line x1="0"  y1="48" x2="128" y2="48"/>
    <line x1="0"  y1="64" x2="128" y2="64"/>
    <line x1="0"  y1="80" x2="128" y2="80"/>
    <line x1="0"  y1="96" x2="128" y2="96"/>
    <line x1="0" y1="112" x2="128" y2="112"/>
    <line x1="16"  y1="0" x2="16"  y2="128"/>
    <line x1="32"  y1="0" x2="32"  y2="128"/>
    <line x1="48"  y1="0" x2="48"  y2="128"/>
    <line x1="64"  y1="0" x2="64"  y2="128"/>
    <line x1="80"  y1="0" x2="80"  y2="128"/>
    <line x1="96"  y1="0" x2="96"  y2="128"/>
    <line x1="112" y1="0" x2="112" y2="128"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="128" height="4" rx="2" fill="url(#bar)" clip-path="url(#rounded)"/>

  <!-- Main wordmark: AMASAMYA -->
  <text x="64" y="68"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="28"
        font-weight="900"
        fill="#7ec8e3"
        text-anchor="middle"
        letter-spacing="-0.5">AMASAMYA</text>

  <!-- Subtitle -->
  <text x="64" y="86"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#4a8fa8"
        text-anchor="middle"
        letter-spacing="2">AUDIT</text>

  <!-- Bottom dot accent -->
  <circle cx="64" cy="100" r="3" fill="#7ec8e3" opacity="0.4"/>
</svg>
</body>
</html>
