<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>*{margin:0;padding:0;background:#000;}body{width:512px;height:512px;overflow:hidden;}</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0369a1"/>
      <stop offset="50%"  stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="88" ry="88"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" ry="88" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#rounded)" opacity="0.06" stroke="#7ec8e3" stroke-width="1">
    <line x1="0"  y1="64"  x2="512" y2="64"/>
    <line x1="0"  y1="128" x2="512" y2="128"/>
    <line x1="0"  y1="192" x2="512" y2="192"/>
    <line x1="0"  y1="256" x2="512" y2="256"/>
    <line x1="0"  y1="320" x2="512" y2="320"/>
    <line x1="0"  y1="384" x2="512" y2="384"/>
    <line x1="0"  y1="448" x2="512" y2="448"/>
    <line x1="64"  y1="0" x2="64"  y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="512" height="14" fill="url(#bar)" clip-path="url(#rounded)"/>

  <!-- Glow behind text -->
  <ellipse cx="256" cy="240" rx="200" ry="80" fill="#0369a1" opacity="0.15"/>

  <!-- Main wordmark -->
  <text x="256" y="272"
        font-family="Arial Black, Arial, sans-serif"
        font-size="108"
        font-weight="900"
        fill="#7ec8e3"
        text-anchor="middle"
        letter-spacing="-2">AMASAMYA</text>

  <!-- Subtitle -->
  <text x="256" y="332"
        font-family="Arial, sans-serif"
        font-size="36"
        font-weight="700"
        fill="#4a8fa8"
        text-anchor="middle"
        letter-spacing="10">AUDIT</text>

  <!-- Bottom dot -->
  <circle cx="256" cy="390" r="10" fill="#7ec8e3" opacity="0.35"/>
</svg>
</body>
</html>
